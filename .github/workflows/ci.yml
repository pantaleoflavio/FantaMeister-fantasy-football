name: CI

on:
  push:
  pull_request:

jobs:
  config-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate competition config exists
        run: test -f backend/config/competition.php
      - name: Validate frontend translations exist
        run: test -f frontend/src/i18n/it.json && test -f frontend/src/i18n/en.json