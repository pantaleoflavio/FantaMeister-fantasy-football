services:
  postgres:
    image: postgres:16-alpine
    container_name: fantameister-postgres
    environment:
      POSTGRES_DB: fantasy_football
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
        context: ./backend
        dockerfile: Dockerfile.dev
    container_name: fantameister-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_vendor:/app/vendor
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fantasy_football
      DB_USERNAME: fantasy
    depends_on:
      - postgres

  frontend:
    image: node:24-alpine
    container_name: fantameister-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_vendor:
  frontend_node_modules: